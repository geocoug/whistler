<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fb6d6"/>
      <stop offset="100%" stop-color="#1f7fa1"/>
    </linearGradient>
    <linearGradient id="snow" x1="0.5" y1="0" x2="0.5" y2="0.4">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf6fc" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Back peak -->
  <path d="M340 140 L460 380 L220 380 Z" fill="#04131a" opacity="0.2"/>
  <!-- Main peak -->
  <path d="M200 120 L80 380 L420 380 Z" fill="#04131a" opacity="0.35"/>
  <path d="M200 120 L80 380 L420 380 Z" fill="none" stroke="#04131a" stroke-width="6" opacity="0.15"/>
  <!-- Snow cap on main peak -->
  <path d="M200 120 L158 200 L180 185 L210 210 L232 180 L242 200 Z" fill="url(#snow)"/>
  <!-- Snow cap on back peak -->
  <path d="M340 140 L310 200 L330 190 L350 210 L370 195 L380 200 Z" fill="url(#snow)" opacity="0.8"/>
</svg>
